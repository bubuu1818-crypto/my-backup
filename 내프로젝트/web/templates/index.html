<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드뉴스 자동 생성</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>카드뉴스 자동 생성</h1>
  <span class="badge">모두의병원동행</span>
</header>

<main>
  <!-- 입력 폼 -->
  <aside class="form-panel">
    <form id="cardForm">

      <div class="form-section">
        <h2>기본 정보</h2>

        <label>
          제목 <span class="req">*</span>
          <input type="text" name="title" placeholder="예: 87세 어머니, 혼자가 아니셨어요" required>
        </label>

        <label>
          유형
          <select name="type">
            <option value="사례소개">사례소개</option>
            <option value="정보제공" selected>정보제공</option>
            <option value="홍보">홍보</option>
            <option value="공지">공지</option>
          </select>
        </label>
      </div>

      <div class="form-section">
        <h2>본문</h2>

        <label>
          본문 <span class="req">*</span>
          <textarea name="body" rows="5" placeholder="핵심 내용을 작성하세요. 길이에 따라 카드 수가 자동 조정됩니다." required></textarea>
        </label>

        <div>
          <label style="margin-bottom:8px;">포인트 <small>(선택, 최대 5개)</small></label>
          <div class="points-list" id="pointsList"></div>
          <button type="button" class="btn-add-point" id="addPoint" onclick="addPoint()">
            + 포인트 추가
          </button>
        </div>
      </div>

      <div class="form-section">
        <h2>수치 <small style="text-transform:none;letter-spacing:0;">(선택)</small></h2>
        <div class="row-3">
          <label>값<input type="text" name="stat_value" placeholder="100%"></label>
          <label>라벨<input type="text" name="stat_label" placeholder="만족도"></label>
          <label>출처<input type="text" name="stat_source" placeholder="2026 조사"></label>
        </div>
      </div>

      <div class="form-section">
        <h2>CTA</h2>
        <div class="row-2">
          <label>버튼 텍스트 <span class="req">*</span><input type="text" name="cta_text" placeholder="1:1 안심 상담하기" required></label>
          <label>URL<input type="url" name="cta_url" placeholder="https://"></label>
        </div>
      </div>

      <div class="form-section">
        <h2>플랫폼</h2>
        <div class="platform-grid" id="platformGrid">
          <label class="platform-chip checked" onclick="toggleChip(this)">
            <input type="checkbox" name="platforms" value="instagram-post" checked>
            인스타그램 포스트
          </label>
          <label class="platform-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="platforms" value="instagram-story">
            스토리
          </label>
          <label class="platform-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="platforms" value="kakao">
            카카오
          </label>
          <label class="platform-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="platforms" value="thread">
            스레드
          </label>
        </div>
      </div>

      <button type="submit" class="btn-generate" id="btnGenerate">카드뉴스 생성하기</button>
    </form>
  </aside>

  <!-- 결과 패널 -->
  <section class="result-panel" id="resultPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">🖼</div>
      <p>왼쪽 폼을 작성하고<br><strong>생성하기</strong> 버튼을 누르세요.</p>
    </div>

    <div class="loading-bar" id="loadingBar">
      <div class="spinner"></div>
      <p>카드뉴스 생성 중... (약 15초)</p>
    </div>

    <!-- 생성 완료 후 표시 -->
    <div id="resultContent" style="display:none; display:flex; flex-direction:column; gap:20px;">

      <!-- 플랫폼 탭 -->
      <div class="platform-tabs" id="platformTabs"></div>

      <!-- 카드 그리드 -->
      <div class="cards-grid" id="cardsGrid"></div>

      <!-- Instagram 등록 -->
      <div class="ig-section">
        <h3>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          </svg>
          Instagram 자동 등록
        </h3>

        <div class="ig-status" id="igStatus">
          <span class="dot"></span>
          <span id="igStatusText">API 연결 확인 중...</span>
        </div>

        <label>
          캡션
          <textarea name="ig_caption" id="igCaption" rows="3" placeholder="게시물 캡션을 입력하세요 (해시태그 포함)"></textarea>
        </label>

        <div style="display:flex; gap:8px; align-items:center;">
          <button type="button" class="btn-ig" id="btnIgPost" onclick="postToInstagram()" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            Instagram에 게시
          </button>
          <span id="igNote" style="font-size:12px;color:var(--color-muted);"></span>
        </div>
      </div>

    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
  let currentSlug = null;
  let currentFiles = [];
  let currentPlatform = 'instagram-post';

  // 플랫폼 칩 토글
  function toggleChip(label) {
    const cb = label.querySelector('input[type=checkbox]');
    cb.checked = !cb.checked;
    label.classList.toggle('checked', cb.checked);
  }

  // 포인트 추가
  function addPoint() {
    const list = document.getElementById('pointsList');
    if (list.children.length >= 5) return;

    const div = document.createElement('div');
    div.className = 'point-item';
    div.innerHTML = `
      <input type="text" placeholder="포인트 ${list.children.length + 1}" class="point-input">
      <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
    `;
    list.appendChild(div);
    div.querySelector('input').focus();
  }

  // 폼 데이터 수집
  function getFormData() {
    const form = document.getElementById('cardForm');
    const fd = new FormData(form);

    const platforms = Array.from(
      document.querySelectorAll('input[name="platforms"]:checked')
    ).map(cb => cb.value);

    const points = Array.from(
      document.querySelectorAll('.point-input')
    ).map(i => i.value.trim()).filter(Boolean);

    return {
      title: fd.get('title'),
      body: fd.get('body'),
      type: fd.get('type'),
      cta_text: fd.get('cta_text'),
      cta_url: fd.get('cta_url') || null,
      stat_value: fd.get('stat_value') || null,
      stat_label: fd.get('stat_label') || null,
      stat_source: fd.get('stat_source') || null,
      platforms: platforms.length ? platforms : ['instagram-post'],
      points,
    };
  }

  // 폼 제출
  document.getElementById('cardForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    await generateCards();
  });

  async function generateCards() {
    const btn = document.getElementById('btnGenerate');
    btn.disabled = true;
    btn.textContent = '생성 중...';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('loadingBar').classList.add('active');
    document.getElementById('resultContent').style.display = 'none';

    try {
      const resp = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(getFormData()),
      });
      const data = await resp.json();

      if (!resp.ok) {
        showToast(data.error || '생성 실패', 'error');
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      currentSlug = data.slug;
      currentFiles = data.files;
      renderResults(data.files);
      showToast(`${data.files.length}개 파일 생성 완료`, 'success');

    } catch (err) {
      showToast('서버 오류: ' + err.message, 'error');
      document.getElementById('emptyState').style.display = 'flex';
    } finally {
      btn.disabled = false;
      btn.textContent = '카드뉴스 생성하기';
      document.getElementById('loadingBar').classList.remove('active');
    }
  }

  function renderResults(files) {
    const content = document.getElementById('resultContent');
    content.style.display = 'flex';

    // 플랫폼 목록 추출
    const platforms = [...new Set(files.map(f => f.platform))];
    currentPlatform = platforms[0] || 'instagram-post';

    // 탭 렌더링
    const tabs = document.getElementById('platformTabs');
    tabs.innerHTML = platforms.map(p => `
      <button class="tab-btn ${p === currentPlatform ? 'active' : ''}"
              onclick="switchTab('${p}', this)">${platformLabel(p)}</button>
    `).join('');

    renderCards(currentPlatform);

    // Instagram 등록 버튼 활성화
    const hasIG = files.some(f => f.platform === 'instagram-post');
    document.getElementById('btnIgPost').disabled = !hasIG;
    if (!hasIG) {
      document.getElementById('igNote').textContent = 'instagram-post 플랫폼을 선택해야 합니다.';
    }

    // 캡션 기본값
    const formTitle = document.querySelector('input[name=title]').value;
    document.getElementById('igCaption').value = formTitle
      ? `${formTitle}\n\n#모두의병원동행 #병원동행서비스 #1인가구`
      : '';
  }

  function switchTab(platform, btn) {
    currentPlatform = platform;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(platform);
  }

  function renderCards(platform) {
    const grid = document.getElementById('cardsGrid');
    const files = currentFiles.filter(f => f.platform === platform);
    const isStory = platform === 'instagram-story';

    grid.innerHTML = files.map(f => `
      <div class="card-thumb ${isStory ? 'story' : ''}">
        <img src="/output/${f.path}" alt="${f.filename}" loading="lazy">
        <div class="card-label">${f.filename}</div>
      </div>
    `).join('');
  }

  function platformLabel(p) {
    const map = {
      'instagram-post': '인스타그램',
      'instagram-story': '스토리',
      'kakao': '카카오',
      'thread': '스레드',
      'linkedin': 'LinkedIn',
    };
    return map[p] || p;
  }

  // Instagram 게시
  async function postToInstagram() {
    if (!currentSlug) return;

    const btn = document.getElementById('btnIgPost');
    btn.disabled = true;
    btn.innerHTML = '게시 중...';

    const caption = document.getElementById('igCaption').value;

    try {
      const resp = await fetch('/api/instagram/post', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug: currentSlug, caption }),
      });
      const data = await resp.json();

      if (!resp.ok) {
        showToast(data.error, 'error');
      } else {
        showToast('Instagram 게시 완료! media_id: ' + data.media_id, 'success');
      }
    } catch (err) {
      showToast('오류: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg> Instagram에 게시`;
    }
  }

  // 토스트
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // Instagram API 상태 확인
  async function checkIgStatus() {
    const status = document.getElementById('igStatus');
    const text = document.getElementById('igStatusText');

    try {
      const resp = await fetch('/api/instagram/check');
      const data = await resp.json();

      if (data.valid) {
        status.className = 'ig-status connected';
        text.textContent = `연결됨: @${data.account.username || data.account.id}`;
      } else {
        status.className = 'ig-status error';
        text.textContent = data.error || '연결 실패 (.env 확인 필요)';
      }
    } catch {
      status.className = 'ig-status error';
      text.textContent = '서버 오류';
    }
  }

  // 페이지 로드 시 IG 상태 확인
  checkIgStatus();
</script>

</body>
</html>
